<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color:crimson;
            color:cyan;
            font-family:Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
        }
        #page-wrapper{
            max-width: 700px;
            margin: 0;
            padding: 40px 24px;
        }
        .Yeat-photo{
            width: 400px;
            height: 400px;
            object-fit: contain;
        }
        #photos{
            background-color: crimson;
        }   
        #Listening section{
            position: relative;
            display: flex;
            justify-content: center;
            align-content: center;
            width: 500px;
            height: 500px;
            background-color:blue;
        }
    </style>
</head>
<body>
        <!--
        id: unique, only one element in a page should have it

        class: reusable.Used to identify multiple elements together
        -->
    <div id="page-wrapper">
        <h1>Yeat</h1>
        <p>Disc: An American rapper,singer-songwriter and record-producer</p>
    <div class="photos">
        <img class="Yeat-photo" src="./yeat pics.jpg" alt="Yeat-photo">
        <img class="Yeat-photo" src="./yeatpics.jpg" alt="Yeat-photo">
    </div>
    <div class="Listening section">
        <p class="song">Latest song</p>
        <p class="song">Earliest song</p>
        
        
        
    </div>
</body>
</html>
