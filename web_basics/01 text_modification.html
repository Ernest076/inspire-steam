<html>
    <head>
        <title>Module1: h1 , h2 , p, em, div</title>
    </head>
    <body>
        <h1>Music band</h1>
        <hr>
        <h2>About the band</h2>

        <div>
            <!--em (emphasis) b (bold)-->
            <p>Rediscovering music, <em>One album at a time</em></p>
            <p>Est <b>2026</b></p>

            <!-- small (small text) and i (italic)-->
            <p><small><i>Find our merch.ebay.com</p>
            <hr>
        
            </div>
            </div>
                <!-- sub (subscript), sup (superscript), li-->
                 <h3>Discover</h3>

                    Everybody hit the four-legged sea lion
                    (Uh-uh-uh-uh-uh-uh-uh-HA-HA-HA)
                 </i>
            </div>
    </body>
