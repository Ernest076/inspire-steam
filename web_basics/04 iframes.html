<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


</head>
<body>
    
    <!-- Embed another websites content within your website -->
        
        
        <!--Attributes:
        src- link to the resource online
        width, height ,size of window(pixels) 
        title- people with screen readers etc
        allow full screen- let the user go full screen -->
    
        <iframe width="560" height="315"
                src="https://www.youtube.com/embed/dQw4wWgXcQ"
                title="Youtube video player"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            </iframe>
            
        
</body>
</html>
